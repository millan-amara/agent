# Local Postgres + Redis for prod-parity development (requires Docker).
# This machine's default dev loop uses SQLite + in-process queue (no Docker
# needed) — use this only when you want to exercise the Postgres/Redis paths
# locally. Point apps/api/.env at these:
#   DATABASE_URL="postgresql://azayon:azayon@localhost:5432/azayon"
#   REDIS_URL="redis://localhost:6379"
# and run `node scripts/use-postgres.mjs && npx prisma db push` in apps/api.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: azayon
      POSTGRES_PASSWORD: azayon
      POSTGRES_DB: azayon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
