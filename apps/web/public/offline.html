<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Azayon</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0f0d; color: #e5e7eb; }
      }
      main { max-width: 22rem; text-align: center; }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 20px;
        display: grid; place-items: center;
        border-radius: 16px; background: #0F5132; color: #fff;
        font-size: 26px; font-weight: 700;
      }
      h1 { font-size: 1.25rem; margin: 0 0 8px; }
      p { margin: 0 0 20px; opacity: 0.75; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #0F5132; color: #fff;
        padding: 10px 18px; border-radius: 10px;
        font-size: 0.95rem; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">A</div>
      <h1>You're offline</h1>
      <p>Azayon can't reach the network right now. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
